spring.datasource.url=jdbc:h2:mem:google_photos;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

app.jwt.secret=test-secret-key-with-enough-length-for-hmac-sha256
app.jwt.access-expiration-ms=900000
app.jwt.refresh-expiration-ms=604800000
app.cors.allowed-origins=http://localhost:3000

imagekit.public-key=test-public-key
imagekit.private-key=test-private-key
imagekit.url-endpoint=https://ik.imagekit.io/test
