spring.application.name=google-photos

# Server
server.port=8080

# Database
spring.datasource.url=jdbc:postgresql://localhost:5433/google_photos
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
app.jwt.secret=${JWT_SECRET:change-me-to-a-256-bit-secret-key-for-dev-only-please}
app.jwt.access-expiration-ms=900000
app.jwt.refresh-expiration-ms=604800000

# CORS
app.cors.allowed-origins=http://localhost:3000

# Upload limits
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# ImageKit
imagekit.public-key=${IMAGEKIT_PUBLIC_KEY:public_Ek5GYBiJe6O8gqErGHDvV7MyKP4=}
imagekit.private-key=${IMAGEKIT_PRIVATE_KEY:private_hvIgBYeh77OlXsGHveJ85gbXQW4=}
imagekit.url-endpoint=${IMAGEKIT_URL_ENDPOINT:https://ik.imagekit.io/uz4ecki1h}
