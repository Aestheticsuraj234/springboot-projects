spring:
  application:
    name: lovable-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/lovable}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}

server:
  port: ${PORT:8080}

lovable:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-production-use-at-least-32-characters}
    access-token-expiration-minutes: ${JWT_ACCESS_EXPIRATION_MINUTES:15}
    refresh-token-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:7}
  daytona:
    enabled: ${DAYTONA_ENABLED:false}
    api-key: ${DAYTONA_API_KEY:}
    api-url: ${DAYTONA_API_URL:https://app.daytona.io/api}
    target: ${DAYTONA_TARGET:us}
    snapshot: ${DAYTONA_SNAPSHOT:}
    preview-port: ${DAYTONA_PREVIEW_PORT:5173}
    preview-expiry-seconds: ${DAYTONA_PREVIEW_EXPIRY_SECONDS:3600}
    command-timeout-seconds: ${DAYTONA_COMMAND_TIMEOUT_SECONDS:300}
